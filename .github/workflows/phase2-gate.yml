name: Phase 2 Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase2-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  phase2-gate:
    name: Run Phase 2 gate
    runs-on:
      - self-hosted
      - windows
      - eidonic-phase2
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Show PowerShell version
        shell: powershell
        run: |
          $PSVersionTable

      - name: Run Phase 2 gate with captured output
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $outputPath = Join-Path $env:RUNNER_TEMP "phase2_gate_output.txt"
          powershell -ExecutionPolicy Bypass -File .\scripts\run_phase2_gate_with_capture.ps1 -OutputPath $outputPath

      - name: Upload Phase 2 gate output artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: phase2-gate-output-${{ github.run_id }}
          path: ${{ runner.temp }}/phase2_gate_output.txt
          if-no-files-found: warn
