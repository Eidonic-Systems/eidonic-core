name: Phase 2 Gate

on:
  workflow_dispatch:

jobs:
  phase2-gate:
    name: Run Phase 2 gate
    runs-on:
      - self-hosted
      - windows
      - eidonic-phase2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: powershell
        run: |
          $PSVersionTable

      - name: Run Phase 2 gate
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          powershell -ExecutionPolicy Bypass -File .\scripts\run_phase2_gate.ps1
