name: Phase 2 Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase2-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  phase2-gate:
    name: Run Phase 2 gate
    runs-on:
      - self-hosted
      - windows
      - eidonic-phase2
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show PowerShell version
        shell: powershell
        run: |
          $PSVersionTable

      - name: Run Phase 2 gate
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          powershell -ExecutionPolicy Bypass -File .\scripts\run_phase2_gate.ps1
